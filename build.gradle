buildscript {
    repositories {
        google()
        jcenter()
        mavenCentral()
    }
    dependencies {
        // Android Gradle Plugin المناسب لـ Gradle 6.1.1
        classpath 'com.android.tools.build:gradle:3.5.0'
    }
}

apply plugin: 'com.android.library'

android {
    compileSdkVersion 29

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 29
        versionCode 1
        versionName "1.0"
        consumerProguardFiles 'consumer-rules.pro'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            // هذا يخبر Gradle أن يبحث عن ملف tun2socks.aar داخل مجلد libs
            jniLibs.srcDirs = ['libs']
        }
    }
}

dependencies {
    // لا توجد dependencies إضافية الآن
}
