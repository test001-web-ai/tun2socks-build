buildscript {
    repositories {
        google()
        jcenter()
        mavenCentral()
    }
    dependencies {
        // Android Gradle Plugin المناسب لـ Gradle 6.1.1
        classpath 'com.android.tools.build:gradle:3.5.0'
    }
}

apply plugin: 'com.android.library'
apply plugin: 'maven-publish'

android {
    compileSdkVersion 29

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 29
        versionCode 1
        versionName "1.0"
        consumerProguardFiles 'consumer-rules.pro'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
        }
    }
}

publishing {
    publications {
        release(MavenPublication) {
            groupId = 'com.github.test001-web-ai'
            artifactId = 'tun2socks-build'
            version = 'v0.9.4'

            // هذا هو ملف AAR الذي سيتم نشره
            artifact("$buildDir/outputs/aar/${project.name}-release.aar")
        }
    }
    repositories {
        maven {
            url = uri("$buildDir/repo")
        }
    }
}

dependencies {
    // لا توجد dependencies إضافية الآن
}
